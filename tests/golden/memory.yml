# Harder / discriminating queries below: plausible distractors share keywords,
# so the top-3 will not always be a clean hit and recall@3 stays under 1.0.

- query: postgres query plan ignored the index and did a seq scan
  relevant: [496f00d6]

- query: handling flaky third party API calls with backoff
  relevant: [afd1bd61]

- query: react re-render performance from a single context provider
  relevant: [f520c62d]

# Distractor: the true answer (context-provider re-render fix, f520c62d) is
# keyword-starved on "performance", so the lexical pipeline surfaces other
# react memories ahead of it and it falls outside the top-3 -> a genuine miss
# that drives recall@3 and MRR below 1.0. This is the discriminating query.
- query: react performance
  relevant: [f520c62d]

# Distractor: both redis memories match; the stampede fix (2bbfbe7e) is the
# heavy-traffic one but the token-bucket memory outranks it, landing the true
# answer at rank 2 -> recall@3 hit, reciprocal rank 0.5.
- query: redis under heavy traffic
  relevant: [2bbfbe7e]
