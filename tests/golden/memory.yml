# Hand-curated golden retrieval pairs for the lexical eval gate.
# Each `relevant` id is the corpus memory whose body genuinely answers the
# query. Run via: comemory eval --golden tests/golden/memory.yml --golden-only --k 3
# Scored by scripts/eval-check.sh (recall@3 + MRR against tests/golden/floor.toml).
#
# IMPORTANT: query text must NOT contain any bare 8-hex token, or the
# eval-check preflight greps it as an id and fails.

