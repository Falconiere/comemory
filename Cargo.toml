[package]
name = "qwick"
version = "0.1.0"
edition = "2021"
description = "Agentic dev memory + code-aware semantic search via a two-layer property graph."
license = "MIT"
repository = "https://github.com/SidegigLLC/qwick"
rust-version = "1.78"

[[bin]]
name = "qwick"
path = "src/main.rs"

[lib]
path = "src/lib.rs"

[dependencies]
anyhow = "1"
arrow-array = "58"
arrow-schema = "58"
clap = { version = "4", features = ["derive", "env"] }
fastembed = "4"
futures = "0.3"
git2 = { version = "0.19", default-features = false, features = ["vendored-libgit2"] }
ignore = "0.4"
kuzu = "0.7"
lancedb = "0.29"
once_cell = "1"
owo-colors = "4"
rusqlite = { version = "0.32", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
sha2 = "0.10"
thiserror = "1"
time = { version = "0.3", features = ["serde", "formatting", "parsing", "macros"] }
tokio = { version = "1", features = ["full"] }
toml = "0.8"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
walkdir = "2"

# url 2.5.8 was published with a duplicate Debug impl on `Url` that fails to
# compile under recent rustc; pin transitive dep to last good release.
url = "=2.5.7"

[dependencies.ast-grep-core]
version = "0.30"

[dev-dependencies]
assert_cmd = "2"
insta = { version = "1", features = ["json", "yaml"] }
predicates = "3"
proptest = "1"
tempfile = "3"

[profile.release]
lto = "fat"
codegen-units = 1
strip = "symbols"

# Deps reserved for Tasks 4–22 of the Rust rewrite plan. cargo-machete flags
# them as "unused" until those tasks land; whitelist them here so the dup-check
# gate stays green during the early build-out.
[package.metadata.cargo-machete]
ignored = [
  "ast-grep-core", "clap", "fastembed", "git2", "ignore", "kuzu", "lancedb",
  "once_cell", "owo-colors", "rusqlite", "serde",
  "sha2", "time", "tokio", "walkdir",
  "anyhow", "tracing",
  # url is a transitive-version pin (see comment above the [dependencies.url] entry).
  "url",
]
