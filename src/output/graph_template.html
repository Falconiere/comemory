<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>comemory — code graph</title>
<script src="https://cdn.jsdelivr.net/npm/graphology@0.25.4/dist/graphology.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/graphology-layout-forceatlas2@0.10.1/dist/graphology-layout-forceatlas2.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sigma@3.0.2/dist/sigma.min.js"></script>
<style>
  html,body{margin:0;height:100%;font-family:system-ui,sans-serif}
  #cy{width:100%;height:100vh;display:block;background:#fafbfc}
  #panel{position:fixed;top:10px;left:10px;background:rgba(255,255,255,.93);
    border:1px solid #ccc;border-radius:8px;padding:10px 12px;font-size:13px;z-index:10}
  #panel label{display:block;margin:3px 0;cursor:pointer}
  .sw{display:inline-block;width:12px;height:12px;margin-right:6px;
    vertical-align:middle;border-radius:2px}
  #stats{color:#555;margin-top:6px}
  #hint{color:#888;margin-top:4px;font-size:11px}
  #err{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    color:#b00;font-size:14px;text-align:center;display:none}
</style>
</head>
<body>
<div id="panel">
  <strong>comemory code graph</strong>
  <!-- Toggles are hardcoded to the two relations rels_of emits (imports,
       co_changed). A future third edge kind would render but not be
       toggleable here until a matching checkbox is added. -->
  <label><input type="checkbox" id="f-imports" checked>
    <span class="sw" style="background:#3367d6"></span>imports</label>
  <label><input type="checkbox" id="f-cochanged" checked>
    <span class="sw" style="background:#d9730d"></span>co_changed</label>
  <div id="stats"></div>
  <div id="hint">node size = PageRank · click a file to focus · drag to pan · scroll to zoom</div>
</div>
<div id="cy"></div>
<div id="err">could not load the sigma.js viewer (needs network on first load)</div>
<script>
const DATA = __GRAPH_DATA__;

// Guard: the three CDN libraries must all have loaded. WebGL render lives in
// Sigma; without it we cannot draw anything, so surface a clear message rather
// than failing silently on a blank canvas.
if (typeof graphology === 'undefined' ||
    typeof graphologyLayoutForceAtlas2 === 'undefined' ||
    typeof Sigma === 'undefined') {
  document.getElementById('err').style.display = 'block';
} else {
  renderGraph();
}

function renderGraph() {
  const Graph = graphology.Graph || graphology;
  const fa2 = graphologyLayoutForceAtlas2;

  const maxRank = DATA.nodes.reduce((m, n) => Math.max(m, n.rank), 0) || 1;
  const maxWeight = DATA.edges.reduce((m, e) => Math.max(m, e.weight), 1);

  // Directed multigraph: imports are directed, co_changed undirected, and the
  // same file pair may carry both — so parallel edges must be allowed.
  const graph = new Graph({ type: 'directed', multi: true });

  // Seed nodes on a circle so ForceAtlas2 has non-degenerate start positions
  // (FA2 produces NaN coordinates if every node starts at the origin).
  const N = DATA.nodes.length || 1;
  DATA.nodes.forEach((n, i) => {
    const a = (2 * Math.PI * i) / N;
    graph.addNode(n.id, {
      label: n.label,
      x: Math.cos(a),
      y: Math.sin(a),
      size: 3 + 17 * (n.rank / maxRank),
      color: '#5b8def'
    });
  });

  DATA.edges.forEach((e, i) => {
    // Tolerate dangling endpoints: index-code may not have populated every
    // referenced file yet. Skip rather than throw on a missing node.
    if (!graph.hasNode(e.src) || !graph.hasNode(e.dst)) return;
    const imports = e.rel === 'imports';
    const size = imports
      ? 1
      : 1 + 5 * ((e.weight - 1) / (maxWeight - 1 || 1));
    try {
      graph.addDirectedEdgeWithKey('e' + i, e.src, e.dst, {
        rel: e.rel,
        weight: e.weight,
        type: imports ? 'arrow' : 'line',
        color: imports ? '#3367d6' : '#d9730d',
        size
      });
    } catch (_) {
      // Duplicate key / self-loop: ignore, the edge adds no signal.
    }
  });

  // Interaction state, read by the reducers below.
  const filter = { imports: true, co_changed: true };
  let focus = null;        // focused node id, or null
  let focusHood = null;    // Set of node ids in the focus neighborhood

  const renderer = new Sigma(graph, document.getElementById('cy'), {
    defaultEdgeType: 'line',
    renderEdgeLabels: false,
    labelRenderedSizeThreshold: 6,
    nodeReducer(node, data) {
      const res = Object.assign({}, data);
      if (focus && focusHood && !focusHood.has(node)) {
        res.color = '#d6dbe1';
        res.label = '';
      }
      return res;
    },
    edgeReducer(edge, data) {
      const res = Object.assign({}, data);
      if (!filter[data.rel]) {
        res.hidden = true;
        return res;
      }
      if (focus) {
        const ext = graph.extremities(edge);
        if (ext[0] !== focus && ext[1] !== focus) {
          res.hidden = true;
        }
      }
      return res;
    }
  });

  // ForceAtlas2 driven on requestAnimationFrame: a few iterations per frame so
  // the layout animates and never blocks the main thread. The WebGL render
  // stays at 60fps throughout; the simulation stops after a fixed budget.
  const settings = fa2.inferSettings(graph);
  let frames = 0;
  const MAX_FRAMES = 600;
  (function step() {
    fa2.assign(graph, { iterations: 1, settings });
    if (++frames < MAX_FRAMES) requestAnimationFrame(step);
  })();

  const importsBox = document.getElementById('f-imports');
  const cochangedBox = document.getElementById('f-cochanged');
  function applyFilters() {
    filter.imports = importsBox.checked;
    filter.co_changed = cochangedBox.checked;
    renderer.refresh();
  }
  importsBox.addEventListener('change', applyFilters);
  cochangedBox.addEventListener('change', applyFilters);

  renderer.on('clickNode', ({ node }) => {
    focus = node;
    focusHood = new Set(graph.neighbors(node));
    focusHood.add(node);
    renderer.refresh();
  });
  renderer.on('clickStage', () => {
    focus = null;
    focusHood = null;
    renderer.refresh();
  });

  document.getElementById('stats').textContent =
    DATA.nodes.length + ' files · ' + DATA.edges.length + ' edges';
}
</script>
</body>
</html>
