name: Test

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-22.04
    env:
      COMEMORY_INDEXING_AUTO_REINDEX: "off"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: "1.95"
          components: rustfmt, clippy, llvm-tools-preview
      - name: Cache cargo build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install cargo tools
        uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: cargo-nextest,cargo-llvm-cov,typos-cli@1.32.0
      - name: Run check-all gate
        run: bash scripts/check-all.sh
      - name: Run coverage gate
        run: bash scripts/coverage-check.sh
      - name: Run eval gate
        run: bash scripts/eval-check.sh
