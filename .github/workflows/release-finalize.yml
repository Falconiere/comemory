# Hand-maintained release finalize workflow — picks up after the
# dist-generated .github/workflows/release.yml finishes a tag build, runs a
# smoke test against the published tarball, and fails the workflow run if
# the artifact is malformed. The release itself is already created by
# the dist-generated `host` job in release.yml.
#
# This file is intentionally NOT generated by `cargo dist init`. Anything
# added to the dist-generated release.yml will be clobbered on the next
# dist regeneration; the additions here live in a separate file.
#
# Trigger: a release is published (stable or prerelease) on GitHub.
# Concurrency: per-tag so a fast re-tag doesn't collide with the previous
# run for the same tag.

name: Release Finalize

on:
  release:
    types: [published, prereleased]

permissions:
  contents: read

concurrency:
  group: release-finalize-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  smoke-test:
    name: verify release artifacts
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Download build artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          pattern: artifacts-*
          path: artifacts
          merge-multiple: true

      - name: Locate macOS tarball
        id: locate
        run: |
          # Single target from Cargo.toml: aarch64-apple-darwin.
          # On a Linux runner, the tarball is here but the binary is macOS-only.
          # We only verify its contents (manifest + tar layout + size sanity) —
          # we can't execute it on Linux. The dist-generated release.yml already
          # proved it builds + links.
          tarball="$(ls artifacts/*/comemory-aarch64-apple-darwin.tar.xz 2>/dev/null \
            | head -1 || true)"
          if [[ -z "$tarball" ]]; then
            echo "::error::no comemory-aarch64-apple-darwin.tar.xz artifact found"
            ls -la artifacts/ || true
            exit 1
          fi
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"

      - name: Verify tarball layout + size
        run: |
          # Confirm the tarball is a valid archive with the expected binary
          # path and a sane size (> 1 MB — the binary alone is ~10 MB).
          size="$(stat -c%s "${{ steps.locate.outputs.tarball }}" 2>/dev/null \
            || stat -f%z "${{ steps.locate.outputs.tarball }}")"
          if (( size < 1048576 )); then
            echo "::error::tarball is suspiciously small: ${size} bytes"
            exit 1
          fi
          tar -tJf "${{ steps.locate.outputs.tarball }}" \
            | grep -q '^comemory-aarch64-apple-darwin/comemory$' \
            || { echo "::error::expected binary not in tarball"; exit 1; }
          echo "::notice::tarball layout OK (${size} bytes)"

      - name: Cleanup
        if: always()
        run: |
          rm -rf artifacts/
