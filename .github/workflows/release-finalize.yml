# Hand-maintained release finalize workflow — picks up after the
# dist-generated .github/workflows/release.yml finishes a tag build, runs a
# smoke test against the published tarball, and fails the workflow run if
# the artifact is malformed. The release itself is already created by
# the dist-generated `host` job in release.yml.
#
# This file is intentionally NOT generated by `cargo dist init`. Anything
# added to the dist-generated release.yml will be clobbered on the next
# dist regeneration; the additions here live in a separate file.
#
# Trigger: a release is published (stable or prerelease) on GitHub.
# Concurrency: per-tag so a fast re-tag doesn't collide with the previous
# run for the same tag.

name: Release Finalize

on:
  release:
    types: [published, prereleased]

permissions:
  contents: read

concurrency:
  group: release-finalize-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  smoke-test:
    name: verify release artifacts
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Download build artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          pattern: artifacts-*
          path: artifacts
          merge-multiple: true

      - name: Locate macOS tarball
        id: locate
        run: |
          # Single target from Cargo.toml: aarch64-apple-darwin.
          # On a Linux runner, the tarball is here but the binary is macOS-only.
          # We only verify its contents (manifest + tar layout + size sanity) —
          # we can't execute it on Linux. The dist-generated release.yml already
          # proved it builds + links.
          tarball="$(ls artifacts/*/comemory-aarch64-apple-darwin.tar.xz 2>/dev/null \
            | head -1 || true)"
          if [[ -z "$tarball" ]]; then
            echo "::error::no comemory-aarch64-apple-darwin.tar.xz artifact found"
            ls -la artifacts/ || true
            exit 1
          fi
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"

      - name: Verify tarball layout + size
        env:
          # Same defense-in-depth as the curate step above: route the step
          # output through env: rather than inlining ${{ ... }} into the
          # shell command line.
          TARBALL: ${{ steps.locate.outputs.tarball }}
        run: |
          # Confirm the tarball is a valid archive with the expected binary
          # path and a sane size (> 1 MB — the binary alone is ~10 MB).
          size="$(stat -c%s "$TARBALL" 2>/dev/null \
            || stat -f%z "$TARBALL")"
          if (( size < 1048576 )); then
            echo "::error::tarball is suspiciously small: ${size} bytes"
            exit 1
          fi
          tar -tJf "$TARBALL" \
            | grep -q '^comemory-aarch64-apple-darwin/comemory$' \
            || { echo "::error::expected binary not in tarball"; exit 1; }
          echo "::notice::tarball layout OK (${size} bytes)"

      - name: Curate release notes from CHANGELOG.md
        id: notes
        env:
          TAG: ${{ github.event.release.tag_name }}
          # Route all interpolated GitHub contexts through env: rather than
          # inlining ${{ ... }} into the shell command. Tag names are
          # user-controllable, and Actions expands ${{ ... }} before bash
          # parses the line — so an inlined tag like `$(rm -rf /)` would
          # execute in the runner. Variable expansion inside a quoted string
          # is safe; command substitution is not.
          PREV_TAG: ${{ github.event.release.previous_tag_name }}
          REPO: ${{ github.repository }}
        run: |
          ver="${TAG#v}"
          bash scripts/curate-release-notes.sh "$ver" > "$RUNNER_TEMP/notes.md"
          if [[ ! -s "$RUNNER_TEMP/notes.md" ]]; then
            echo "::warning::curate-release-notes.sh produced empty output; falling back to default"
            echo "See the commit log at https://github.com/${REPO}/compare/${PREV_TAG}...${TAG}" > "$RUNNER_TEMP/notes.md"
          fi
          echo "notes-bytes=$(wc -c < "$RUNNER_TEMP/notes.md" | tr -d ' ')" >> "$GITHUB_OUTPUT"

      - name: Edit release with curated notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          gh release edit "$TAG" --notes-file "$RUNNER_TEMP/notes.md"

      - name: Sign SHA256SUMS (optional, opt-in)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
          MINISIGN_KEY: ${{ secrets.MINISIGN_KEY }}
          MINISIGN_PASSPHRASE: ${{ secrets.MINISIGN_PASSPHRASE }}
        continue-on-error: true
        run: |
          # The MINISIGN_KEY + MINISIGN_PASSPHRASE secrets are optional. If
          # they're not set, the sign-release.sh script prints a warning and
          # exits 0 — the release is still published, just without a signature.
          bash scripts/sign-release.sh "$TAG"

      - name: Cleanup
        if: always()
        run: |
          rm -rf artifacts/
