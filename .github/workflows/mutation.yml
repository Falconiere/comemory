name: Mutation

on:
  pull_request:
  schedule:
    # Nightly full-crate mutation run (report-only).
    - cron: "0 4 * * *"

permissions:
  contents: read

jobs:
  mutants-diff:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-24.04
    # Report-only at launch: surface surviving mutants without failing the PR.
    continue-on-error: true
    env:
      COMEMORY_INDEXING_AUTO_REINDEX: "off"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          # Full history so the base..HEAD diff can be computed.
          fetch-depth: 0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: "1.95"
          components: rustfmt, clippy
      - name: Cache cargo build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install cargo tools
        uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: cargo-mutants,cargo-nextest
      - name: Compute PR diff
        # base.sha is in the event payload and present in history (fetch-depth: 0),
        # so this needs no origin/<ref> remote-tracking ref to exist.
        run: git diff ${{ github.event.pull_request.base.sha }}...HEAD --unified=3 > pr.diff
      - name: Run diff-scoped mutants
        # Report-only at launch: a surviving mutant must not fail the check (the
        # survivor is surfaced in the log + uploaded mutants.out/ artifact).
        # Drop the `|| true` to flip this gate to blocking later.
        run: bash scripts/mutation-check.sh diff pr.diff || true
      - name: Upload mutants report
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: mutants-diff
          path: mutants.out/
          if-no-files-found: ignore

  mutants-full:
    if: ${{ github.event_name == 'schedule' }}
    runs-on: ubuntu-24.04
    env:
      COMEMORY_INDEXING_AUTO_REINDEX: "off"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: "1.95"
          components: rustfmt, clippy
      - name: Cache cargo build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install cargo tools
        uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: cargo-mutants,cargo-nextest
      - name: Run full-crate mutants
        # Report-only: never fail the nightly schedule.
        run: bash scripts/mutation-check.sh full || true
      - name: Upload mutants report
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: mutants-full
          path: mutants.out/
          if-no-files-found: ignore
