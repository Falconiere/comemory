# Release workflow — prebuilt binaries via cargo-dist + Homebrew tap update.
#
# This is a minimal, hand-written workflow that mirrors what `cargo dist init`
# would generate for the configuration in `Cargo.toml`'s `[package.metadata.dist]`
# block (cargo-dist 0.22.1, installers = ["shell", "homebrew"], hosting = github,
# tap = SidegigLLC/homebrew-tap).
#
# When `cargo-dist` is installed locally, regenerate this file with:
#
#     cargo install cargo-dist --version 0.22.1
#     cargo dist init --yes
#
# Docs: https://opensource.axo.dev/cargo-dist/book/ci/github.html
#
# Trigger: push of any tag matching `v*` (e.g. `v0.1.0`, `v1.2.3-rc.1`).
# Pull requests that touch this workflow or Cargo.toml run the `plan` job only
# (dry-run; no artifacts uploaded) so release config drift is caught before the
# tag is cut.
#
# Security note: every dynamic GitHub context value used inside a `run:` shell
# is first bound to an `env:` variable so the shell sees a quoted literal, not
# template-interpolated text. This follows the guidance in
# https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/

name: release

on:
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - ".github/workflows/release.yml"
      - "Cargo.toml"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_DIST_VERSION: "0.22.1"

jobs:
  # Phase 1: parse Cargo.toml's [package.metadata.dist] and emit a matrix of
  # (target, runner) pairs for the build jobs to fan out over. On PRs this is
  # the only job that runs — it surfaces config errors without uploading.
  plan:
    runs-on: ubuntu-latest
    outputs:
      val: ${{ steps.plan.outputs.manifest }}
      tag: ${{ steps.tag.outputs.name }}
      tag-flag: ${{ steps.tag.outputs.flag }}
      publishing: ${{ steps.tag.outputs.publishing }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install cargo-dist
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-dist@${{ env.CARGO_DIST_VERSION }}
      - name: Determine if this is a tagged release
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$EVENT_NAME" == "push" && "$REF_TYPE" == "tag" ]]; then
            {
              echo "publishing=true"
              echo "flag=--tag=$REF_NAME"
              echo "name=$REF_NAME"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "publishing=false"
              echo "flag="
              echo "name="
            } >> "$GITHUB_OUTPUT"
          fi
      - name: cargo dist plan
        id: plan
        env:
          TAG_FLAG: ${{ steps.tag.outputs.flag }}
        run: |
          cargo dist plan $TAG_FLAG --output-format=json > plan.json
          {
            echo "manifest<<EOF"
            cat plan.json
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: artifacts-plan
          path: plan.json

  # Phase 2: build the actual binary tarballs on the right OS per target.
  # cargo-dist's `build --artifacts=local` produces the per-target archives;
  # `--artifacts=global` (run once on linux) produces the shell installer + the
  # Homebrew formula. We split linux into a separate `global` job below.
  build-local:
    needs: plan
    if: needs.plan.outputs.publishing == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-13
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-dist
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-dist@${{ env.CARGO_DIST_VERSION }}
      # Linux aarch64 needs a cross-compiling C toolchain because of
      # bundled-libgit2 + ring (via lancedb). cargo-dist will use `cross`
      # automatically when present; install it on linux runners.
      - name: Install cross-compiler (aarch64-linux only)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          {
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc"
            echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc"
          } >> "$GITHUB_ENV"
      - name: cargo dist build (local artifacts)
        env:
          TAG_FLAG: ${{ needs.plan.outputs.tag-flag }}
          TARGET: ${{ matrix.target }}
        run: |
          cargo dist build $TAG_FLAG \
            --target="$TARGET" \
            --artifacts=local \
            --print=linkage > dist-manifest.json
      - uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.target }}
          path: |
            target/distrib/*.tar.gz
            target/distrib/*.tar.xz
            target/distrib/*.zip
            target/distrib/*-manifest.json

  # Phase 3: build the installer artifacts (shell script, Homebrew formula).
  # Runs once after every per-target build succeeds; needs the local manifests
  # to know which checksums to embed in the installer + formula.
  build-global:
    needs: [plan, build-local]
    if: needs.plan.outputs.publishing == 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-dist
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-dist@${{ env.CARGO_DIST_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          pattern: artifacts-*
          merge-multiple: true
          path: target/distrib/
      - name: cargo dist build (global artifacts)
        env:
          TAG_FLAG: ${{ needs.plan.outputs.tag-flag }}
        run: |
          cargo dist build $TAG_FLAG --artifacts=global
      - uses: actions/upload-artifact@v4
        with:
          name: artifacts-global
          path: |
            target/distrib/*.sh
            target/distrib/*.rb
            target/distrib/dist-manifest.json

  # Phase 4: create the GitHub release, upload every artifact, and bump the
  # Homebrew tap formula. cargo-dist's `host` subcommand handles all of that
  # given the merged manifest + artifact directory.
  host:
    needs: [plan, build-local, build-global]
    if: needs.plan.outputs.publishing == 'true'
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install cargo-dist
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-dist@${{ env.CARGO_DIST_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          pattern: artifacts-*
          merge-multiple: true
          path: target/distrib/
      - name: cargo dist host
        env:
          # Personal access token with `repo` scope on SidegigLLC/homebrew-tap
          # is required to push the updated formula. Falls back to GITHUB_TOKEN
          # for the release upload itself.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_FLAG: ${{ needs.plan.outputs.tag-flag }}
        run: |
          cargo dist host $TAG_FLAG \
            --steps=upload \
            --steps=release
