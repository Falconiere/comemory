name: Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: code-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: falconiere/toolu-ghactions/code-review@v3
        with:
          PROVIDERS: |
            [{"provider": "openrouter", "model": "deepseek/deepseek-v4-pro", "api_key": "${{ secrets.OPENROUTER_API_KEY }}"}]
